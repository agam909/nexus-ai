name: corp_rag_chat
description: Corporate RAG chat client (Flutter Desktop + Mobile) talking to a FastAPI + LangChain + Groq backend.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http: ^1.2.2
  flutter_markdown: ^0.7.3
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.4.0
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  desktop_drop: ^0.4.4
  cross_file: ^0.3.4+2
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#011627"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
